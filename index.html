<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GroqChat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3d;
    --accent: #f97316;
    --accent2: #fb923c;
    --text: #e8e8f0;
    --text2: #8888a8;
    --success: #22c55e;
    --error: #ef4444;
    --web: #3b82f6;
    --vision: #a855f7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 8px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    font-size: 15px;
    color: var(--accent);
  }

  .logo-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }

  .header-right { display: flex; align-items: center; gap: 6px; }

  .model-wrap { position: relative; }

  select#modelSelect {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    padding: 6px 28px 6px 8px;
    border-radius: 8px;
    outline: none;
    cursor: pointer;
    appearance: none;
    max-width: 148px;
  }

  select#modelSelect:focus { border-color: var(--accent); }

  .model-badges {
    display: flex;
    gap: 3px;
    position: absolute;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
  }

  .badge {
    font-size: 9px;
    padding: 1px 4px;
    border-radius: 4px;
    font-weight: 600;
    line-height: 1.4;
  }
  .badge.web { background: var(--web)22; color: var(--web); border: 1px solid var(--web)44; }
  .badge.vision { background: var(--vision)22; color: var(--vision); border: 1px solid var(--vision)44; }

  #capBadges {
    display: flex; gap: 4px; align-items: center;
  }

  button#settingsBtn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    width: 34px; height: 34px;
    border-radius: 8px;
    cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, color 0.2s;
    flex-shrink: 0;
  }
  button#settingsBtn:hover { border-color: var(--accent); color: var(--accent); }

  #chatArea {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }
  #chatArea::-webkit-scrollbar { width: 3px; }
  #chatArea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .empty-state {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; text-align: center;
    padding: 32px 20px; color: var(--text2);
  }
  .empty-icon {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, var(--accent)22, var(--accent2)22);
    border: 1px solid var(--accent)44;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .empty-state h2 { font-size: 17px; font-weight: 600; color: var(--text); }
  .empty-state p { font-size: 13px; line-height: 1.5; max-width: 260px; }

  .cap-row {
    display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
    margin-top: 2px;
  }
  .cap-pill {
    font-size: 11px; padding: 4px 10px; border-radius: 12px; font-weight: 500;
  }
  .cap-pill.web { background: var(--web)22; color: var(--web); border: 1px solid var(--web)33; }
  .cap-pill.vision { background: var(--vision)22; color: var(--vision); border: 1px solid var(--vision)33; }
  .cap-pill.fast { background: var(--success)22; color: var(--success); border: 1px solid var(--success)33; }

  .suggestion-chips { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin-top: 4px; }
  .chip {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); font-size: 12px; padding: 5px 11px;
    border-radius: 18px; cursor: pointer; transition: all 0.2s;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent)11; }

  .msg { display: flex; gap: 8px; animation: fadeUp 0.2s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(7px); } to { opacity:1; transform:translateY(0); } }
  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 26px; height: 26px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; flex-shrink: 0; margin-top: 2px;
  }
  .msg.user .avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .msg.ai .avatar { background: var(--surface2); border: 1px solid var(--border); }

  .bubble {
    max-width: calc(100% - 40px);
    padding: 9px 13px; border-radius: 12px;
    font-size: 14px; line-height: 1.65; word-break: break-word;
  }
  .msg.user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .msg.ai .bubble { background: var(--surface2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

  .msg.ai .bubble pre {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 7px; padding: 10px; overflow-x: auto;
    margin: 7px 0; font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }
  .msg.ai .bubble code {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    background: var(--bg); padding: 1px 4px; border-radius: 3px;
  }
  .msg.ai .bubble pre code { background: transparent; padding: 0; }

  .img-preview {
    max-width: 200px; max-height: 150px;
    border-radius: 8px; margin-bottom: 6px;
    border: 1px solid var(--border); display: block;
  }

  .model-tag {
    font-size: 10px; color: var(--text2); margin-top: 3px;
    font-family: 'JetBrains Mono', monospace; padding-left: 34px;
    display: flex; align-items: center; gap: 4px;
  }

  .web-badge-inline {
    font-size: 9px; padding: 1px 5px; border-radius: 3px;
    background: var(--web)22; color: var(--web); border: 1px solid var(--web)44;
    font-family: 'Inter', sans-serif; font-weight: 600;
  }

  .typing-dots { display: flex; gap: 4px; align-items: center; padding: 3px 0; }
  .typing-dots span {
    width: 6px; height: 6px; background: var(--accent);
    border-radius: 50%; animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100% { transform:translateY(0); opacity:0.4; }
    30% { transform:translateY(-5px); opacity:1; }
  }

  .input-area {
    padding: 10px 14px 12px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* Image preview strip */
  #imgPreviewStrip {
    display: none; gap: 6px; margin-bottom: 8px; flex-wrap: wrap;
  }
  .strip-thumb {
    position: relative; width: 52px; height: 52px;
  }
  .strip-thumb img {
    width: 52px; height: 52px; border-radius: 7px;
    object-fit: cover; border: 1px solid var(--border);
  }
  .strip-thumb button {
    position: absolute; top: -4px; right: -4px;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--error); border: none; color: #fff;
    font-size: 10px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; line-height: 1;
  }

  .input-row { display: flex; gap: 7px; align-items: flex-end; }

  .input-actions { display: flex; gap: 5px; align-items: flex-end; }

  textarea#msgInput {
    flex: 1;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'Inter', sans-serif;
    font-size: 14px; padding: 10px 12px; border-radius: 12px;
    outline: none; resize: none; max-height: 110px; min-height: 42px;
    line-height: 1.5; transition: border-color 0.2s;
  }
  textarea#msgInput::placeholder { color: var(--text2); }
  textarea#msgInput:focus { border-color: var(--accent); }

  .icon-btn {
    width: 42px; height: 42px;
    border-radius: 11px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text2);
    font-size: 17px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn.active { background: var(--web)22; border-color: var(--web); color: var(--web); }

  button#sendBtn {
    width: 42px; height: 42px;
    background: var(--accent); border: none; border-radius: 11px;
    color: #fff; font-size: 17px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.1s; flex-shrink: 0;
  }
  button#sendBtn:hover { background: var(--accent2); }
  button#sendBtn:active { transform: scale(0.95); }
  button#sendBtn:disabled { background: var(--border); cursor: not-allowed; }

  .status-bar {
    display: flex; align-items: center; gap: 5px;
    font-size: 10px; padding: 5px 0 0;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--error); }
  .status-dot.connected { background: var(--success); }
  .status-text { color: var(--text2); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: #000b; z-index: 100;
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px 20px 0 0; padding: 20px 18px 30px;
    width: 100%; max-width: 480px;
    transform: translateY(100%); transition: transform 0.3s ease;
    max-height: 85vh; overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle { width: 34px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
  .modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 5px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .field input, .field textarea, .field select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'Inter', sans-serif;
    font-size: 13px; padding: 9px 12px; border-radius: 9px; outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
  .field input::placeholder, .field textarea::placeholder { color: var(--text2); }
  .field-hint { font-size: 11px; color: var(--text2); margin-top: 4px; }
  .field-hint a { color: var(--accent); text-decoration: none; }

  .model-info-box {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 9px; padding: 10px 12px; margin-top: 10px;
    font-size: 12px; color: var(--text2); line-height: 1.6;
  }
  .model-info-box strong { color: var(--text); }

  .modal-actions { display: flex; gap: 7px; margin-top: 16px; }
  .btn-save {
    flex: 1; background: var(--accent); border: none; color: #fff;
    font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
    padding: 11px; border-radius: 9px; cursor: pointer; transition: background 0.2s;
  }
  .btn-save:hover { background: var(--accent2); }
  .btn-clear {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text2);
    font-family: 'Inter', sans-serif; font-size: 13px; padding: 11px 14px;
    border-radius: 9px; cursor: pointer; transition: all 0.2s;
  }
  .btn-clear:hover { border-color: var(--error); color: var(--error); }

  .section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--text2); font-weight: 600; margin-bottom: 8px;
  }

  /* Hidden file input */
  #fileInput { display: none; }

  .toast {
    position: fixed; top: 14px; left: 50%;
    transform: translateX(-50%) translateY(-70px);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-size: 12px; padding: 9px 16px;
    border-radius: 18px; z-index: 200; transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--success); color: var(--success); }
  .toast.error { border-color: var(--error); color: var(--error); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    GroqChat
  </div>
  <div class="header-right">
    <div id="capBadges"></div>
    <select id="modelSelect"></select>
    <button id="settingsBtn" title="Settings">⚙️</button>
  </div>
</header>

<div id="chatArea">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">⚡</div>
    <h2>GroqChat</h2>
    <p>Blazing fast AI — free Groq API, no credits needed.</p>
    <div class="cap-row">
      <span class="cap-pill web">🌐 Web Search</span>
      <span class="cap-pill vision">🖼 Image Input</span>
      <span class="cap-pill fast">⚡ Ultra Fast</span>
    </div>
    <div class="suggestion-chips">
      <div class="chip" onclick="sendSuggestion('What is the latest news in AI today?')">🌐 Latest AI news</div>
      <div class="chip" onclick="sendSuggestion('Write a Python hello world program')">🐍 Python code</div>
      <div class="chip" onclick="sendSuggestion('Explain quantum computing simply')">⚛️ Quantum</div>
      <div class="chip" onclick="sendSuggestion('Tell me a fun fact')">🎲 Fun fact</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div id="imgPreviewStrip"></div>
  <div class="input-row">
    <button class="icon-btn" id="imgBtn" title="Attach image (vision models only)">🖼</button>
    <button class="icon-btn" id="webBtn" title="Toggle web search">🌐</button>
    <textarea id="msgInput" placeholder="Message..." rows="1"></textarea>
    <button id="sendBtn">➤</button>
  </div>
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">No API key — tap ⚙️ to set up</span>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" multiple>

<!-- Settings Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>⚙️ Settings</h3>

    <div class="field">
      <label>Groq API Key</label>
      <input type="password" id="apiKeyInput" placeholder="gsk_xxxxxxxxxxxxxxxxxxxx" />
      <div class="field-hint">Get free key at <a href="https://console.groq.com/keys" target="_blank">console.groq.com/keys</a> — no credit card.</div>
    </div>

    <div class="field">
      <label>Model</label>
      <select id="modalModelSelect"></select>
      <div id="modalModelInfo" class="model-info-box"></div>
    </div>

    <div class="field">
      <label>System Prompt (optional)</label>
      <textarea id="systemInput" rows="2" placeholder="You are a helpful assistant..."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-clear" onclick="clearChat()">🗑 Clear</button>
      <button class="btn-save" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── MODEL REGISTRY ────────────────────────────────────────────────────────
const MODELS = [
  // ID, label, web search, vision
  { id: 'groq/compound',                          label: 'Groq Compound (Web+Code)',       web: true,  vision: false, note: 'AI system with built-in web search & code execution. Best for real-time queries.' },
  { id: 'groq/compound-mini',                     label: 'Groq Compound Mini (Web+Code)',  web: true,  vision: false, note: 'Lighter compound system with web search & code execution. Faster.' },
  { id: 'openai/gpt-oss-120b',                    label: 'GPT-OSS 120B (Web+Reason)',      web: true,  vision: false, note: '120B flagship open model. Built-in browser search + reasoning. ~500 t/s.' },
  { id: 'openai/gpt-oss-20b',                     label: 'GPT-OSS 20B (Fast)',             web: false, vision: false, note: 'Fastest model at ~1000 t/s. Great for quick tasks.' },
  { id: 'meta-llama/llama-4-scout-17b-16e-instruct', label: 'Llama 4 Scout (Vision)',      web: false, vision: true,  note: '🖼 Supports image input. Upload a photo and ask questions about it. Preview model.' },
  { id: 'llama-3.3-70b-versatile',                label: 'Llama 3.3 70B',                  web: false, vision: false, note: 'Best general-purpose model. 131K context. Balanced speed & quality.' },
  { id: 'llama-3.1-8b-instant',                   label: 'Llama 3.1 8B (Fastest)',         web: false, vision: false, note: 'Ultra fast ~560 t/s. Great for simple tasks and quick answers.' },
  { id: 'qwen/qwen3-32b',                         label: 'Qwen3 32B (Reasoning)',          web: false, vision: false, note: 'Strong reasoning model. 131K context. Good for analysis & coding.' },
];

// ─── STATE ─────────────────────────────────────────────────────────────────
let messages      = [];
let apiKey        = localStorage.getItem('groq_key') || '';
let systemPrompt  = localStorage.getItem('groq_system') || 'You are a helpful, concise assistant.';
let currentModel  = localStorage.getItem('groq_model') || 'groq/compound';
let webSearch     = false;
let pendingImages = []; // [{base64, mime, dataUrl}]
let isLoading     = false;

// ─── DOM REFS ──────────────────────────────────────────────────────────────
const chatArea        = document.getElementById('chatArea');
const emptyState      = document.getElementById('emptyState');
const msgInput        = document.getElementById('msgInput');
const sendBtn         = document.getElementById('sendBtn');
const modelSelect     = document.getElementById('modelSelect');
const modalModelSel   = document.getElementById('modalModelSelect');
const modalModelInfo  = document.getElementById('modalModelInfo');
const statusDot       = document.getElementById('statusDot');
const statusText      = document.getElementById('statusText');
const apiKeyInput     = document.getElementById('apiKeyInput');
const systemInput     = document.getElementById('systemInput');
const modalOverlay    = document.getElementById('modalOverlay');
const toast           = document.getElementById('toast');
const imgBtn          = document.getElementById('imgBtn');
const webBtn          = document.getElementById('webBtn');
const fileInput       = document.getElementById('fileInput');
const imgPreviewStrip = document.getElementById('imgPreviewStrip');
const capBadges       = document.getElementById('capBadges');

// ─── INIT ──────────────────────────────────────────────────────────────────
function buildModelOptions(sel) {
  sel.innerHTML = '';
  MODELS.forEach(m => {
    const o = document.createElement('option');
    o.value = m.id;
    const tags = [m.web ? '🌐' : '', m.vision ? '🖼' : ''].filter(Boolean).join('');
    o.textContent = (tags ? tags + ' ' : '') + m.label;
    if (m.id === currentModel) o.selected = true;
    sel.appendChild(o);
  });
}

buildModelOptions(modelSelect);
buildModelOptions(modalModelSel);
apiKeyInput.value   = apiKey;
systemInput.value   = systemPrompt;
updateStatus();
updateCapBadges();
updateModalModelInfo();

// ─── STATUS ────────────────────────────────────────────────────────────────
function updateStatus() {
  const m = MODELS.find(x => x.id === currentModel);
  const caps = [m?.web ? '🌐 Web' : '', m?.vision ? '🖼 Vision' : ''].filter(Boolean).join(' · ');
  if (apiKey) {
    statusDot.className = 'status-dot connected';
    statusText.textContent = (m?.label || currentModel) + (caps ? ' · ' + caps : '');
  } else {
    statusDot.className = 'status-dot';
    statusText.textContent = 'No API key — tap ⚙️ to set up';
  }
}

function updateCapBadges() {
  const m = MODELS.find(x => x.id === currentModel);
  capBadges.innerHTML = '';
  if (m?.web) capBadges.innerHTML += '<span class="badge web">🌐</span>';
  if (m?.vision) capBadges.innerHTML += '<span class="badge vision">🖼</span>';
}

function updateModalModelInfo() {
  const m = MODELS.find(x => x.id === modalModelSel.value);
  if (!m) return;
  const caps = [m.web ? '🌐 Web Search' : '', m.vision ? '🖼 Image Input' : ''].filter(Boolean);
  modalModelInfo.innerHTML = `<strong>${m.label}</strong><br>${m.note}` +
    (caps.length ? `<br><span style="color:var(--accent)">${caps.join(' · ')}</span>` : '');
}

modelSelect.addEventListener('change', () => {
  currentModel = modelSelect.value;
  localStorage.setItem('groq_model', currentModel);
  // sync modal
  modalModelSel.value = currentModel;
  updateStatus();
  updateCapBadges();
  updateModalModelInfo();
});

modalModelSel.addEventListener('change', updateModalModelInfo);

// ─── SETTINGS MODAL ────────────────────────────────────────────────────────
document.getElementById('settingsBtn').onclick = () => {
  apiKeyInput.value  = apiKey;
  systemInput.value  = systemPrompt;
  modalModelSel.value = currentModel;
  updateModalModelInfo();
  modalOverlay.classList.add('open');
};

modalOverlay.addEventListener('click', e => {
  if (e.target === modalOverlay) modalOverlay.classList.remove('open');
});

function saveSettings() {
  apiKey       = apiKeyInput.value.trim();
  systemPrompt = systemInput.value.trim() || 'You are a helpful, concise assistant.';
  currentModel = modalModelSel.value;
  localStorage.setItem('groq_key',    apiKey);
  localStorage.setItem('groq_system', systemPrompt);
  localStorage.setItem('groq_model',  currentModel);
  modelSelect.value = currentModel;
  modalOverlay.classList.remove('open');
  updateStatus(); updateCapBadges();
  showToast('Settings saved ✓', 'success');
}

function clearChat() {
  messages = [];
  pendingImages = [];
  chatArea.innerHTML = '';
  chatArea.appendChild(emptyState);
  emptyState.style.display = 'flex';
  imgPreviewStrip.style.display = 'none';
  imgPreviewStrip.innerHTML = '';
  modalOverlay.classList.remove('open');
  showToast('Chat cleared', '');
}

// ─── WEB SEARCH TOGGLE ─────────────────────────────────────────────────────
webBtn.addEventListener('click', () => {
  const m = MODELS.find(x => x.id === currentModel);
  if (!m?.web) {
    showToast('Switch to Groq Compound or GPT-OSS 120B for web search', 'error');
    return;
  }
  webSearch = !webSearch;
  webBtn.classList.toggle('active', webSearch);
  showToast(webSearch ? '🌐 Web search ON' : 'Web search OFF', webSearch ? 'success' : '');
});

// ─── IMAGE ATTACH ──────────────────────────────────────────────────────────
imgBtn.addEventListener('click', () => {
  const m = MODELS.find(x => x.id === currentModel);
  if (!m?.vision) {
    showToast('Switch to Llama 4 Scout for image input 🖼', 'error');
    return;
  }
  fileInput.click();
});

fileInput.addEventListener('change', async () => {
  const files = Array.from(fileInput.files);
  for (const f of files) {
    const dataUrl = await readFileAsDataUrl(f);
    const base64  = dataUrl.split(',')[1];
    pendingImages.push({ base64, mime: f.type, dataUrl });
  }
  fileInput.value = '';
  renderImgStrip();
});

function readFileAsDataUrl(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function renderImgStrip() {
  imgPreviewStrip.innerHTML = '';
  if (pendingImages.length === 0) { imgPreviewStrip.style.display = 'none'; return; }
  imgPreviewStrip.style.display = 'flex';
  pendingImages.forEach((img, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'strip-thumb';
    const im = document.createElement('img');
    im.src = img.dataUrl;
    const btn = document.createElement('button');
    btn.textContent = '×';
    btn.onclick = () => { pendingImages.splice(i, 1); renderImgStrip(); };
    wrap.appendChild(im); wrap.appendChild(btn);
    imgPreviewStrip.appendChild(wrap);
  });
}

// ─── INPUT ─────────────────────────────────────────────────────────────────
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 110) + 'px';
});

msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

sendBtn.onclick = sendMessage;

function sendSuggestion(text) { msgInput.value = text; sendMessage(); }

// ─── RENDER ────────────────────────────────────────────────────────────────
function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderMd(text) {
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, l, c) =>
    `<pre><code>${escHtml(c.trim())}</code></pre>`);
  text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`);
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
  text = text.replace(/\n/g, '<br>');
  return text;
}

function hideEmpty() {
  if (emptyState.parentNode) emptyState.style.display = 'none';
}

function addMessage(role, content, model, imgDataUrls) {
  hideEmpty();
  const div    = document.createElement('div');
  div.className = 'msg ' + role;
  const avatar  = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? '👤' : '⚡';
  const bubble  = document.createElement('div');
  bubble.className = 'bubble';

  // Show attached images in user bubble
  if (imgDataUrls && imgDataUrls.length) {
    imgDataUrls.forEach(url => {
      const im = document.createElement('img');
      im.src = url; im.className = 'img-preview';
      bubble.appendChild(im);
    });
  }

  if (role === 'ai') {
    bubble.innerHTML += renderMd(content);
  } else {
    const span = document.createElement('span');
    span.innerHTML = escHtml(content).replace(/\n/g,'<br>');
    bubble.appendChild(span);
  }

  div.appendChild(avatar); div.appendChild(bubble);
  chatArea.appendChild(div);

  if (role === 'ai' && model) {
    const m = MODELS.find(x => x.id === model);
    const tag = document.createElement('div');
    tag.className = 'model-tag';
    tag.innerHTML = (m?.label || model) + (m?.web ? ' <span class="web-badge-inline">🌐 Web</span>' : '');
    chatArea.appendChild(tag);
  }
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addTyping() {
  hideEmpty();
  const div = document.createElement('div');
  div.className = 'msg ai'; div.id = 'typing';
  const avatar = document.createElement('div');
  avatar.className = 'avatar'; avatar.textContent = '⚡';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  div.appendChild(avatar); div.appendChild(bubble);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}
function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

// ─── SEND ──────────────────────────────────────────────────────────────────
async function sendMessage() {
  if (isLoading) return;
  const text = msgInput.value.trim();
  if (!text && pendingImages.length === 0) return;

  if (!apiKey) {
    modalOverlay.classList.add('open');
    showToast('Enter your Groq API key first', 'error');
    return;
  }

  const imgs = [...pendingImages];
  pendingImages = [];
  renderImgStrip();
  msgInput.value = '';
  msgInput.style.height = 'auto';
  isLoading = true;
  sendBtn.disabled = true;

  // Build user content
  const model = currentModel;
  const m = MODELS.find(x => x.id === model);

  let userContent;
  if (imgs.length && m?.vision) {
    userContent = [
      ...imgs.map(i => ({ type: 'image_url', image_url: { url: `data:${i.mime};base64,${i.base64}` } })),
      { type: 'text', text: text || 'Describe this image.' }
    ];
  } else {
    userContent = text;
  }

  messages.push({ role: 'user', content: userContent });
  addMessage('user', text || '(image)', null, imgs.map(i => i.dataUrl));
  addTyping();

  try {
    const body = {
      model,
      messages: [
        { role: 'system', content: systemPrompt },
        ...messages
      ],
      max_tokens: 2048,
      temperature: 0.7,
    };

    // Web search tool for compound & gpt-oss-120b
    if ((model === 'groq/compound' || model === 'groq/compound-mini') || 
        (model === 'openai/gpt-oss-120b' && webSearch)) {
      // Compound models use built-in tools automatically; no extra param needed
    }

    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'API error ' + res.status);
    }

    const data  = await res.json();
    const reply = data.choices[0].message.content;
    messages.push({ role: 'assistant', content: reply });
    removeTyping();
    addMessage('ai', reply, model);

  } catch (err) {
    removeTyping();
    addMessage('ai', '❌ ' + err.message, null);
    showToast(err.message.slice(0, 60), 'error');
  }

  isLoading = false;
  sendBtn.disabled = false;
  updateStatus();
  msgInput.focus();
}

// ─── TOAST ─────────────────────────────────────────────────────────────────
function showToast(msg, type) {
  toast.textContent = msg;
  toast.className = 'toast ' + type + ' show';
  setTimeout(() => toast.className = 'toast ' + type, 2400);
}
</script>
