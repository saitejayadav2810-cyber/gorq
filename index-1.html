<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GroqChat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3d;
    --accent: #f97316;
    --accent2: #fb923c;
    --text: #e8e8f0;
    --text2: #8888a8;
    --user-bubble: #1a1a2e;
    --ai-bubble: #13131a;
    --success: #22c55e;
    --error: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 10px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    font-size: 16px;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  select#modelSelect {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 8px;
    outline: none;
    cursor: pointer;
    max-width: 140px;
  }

  select#modelSelect:focus {
    border-color: var(--accent);
  }

  button#settingsBtn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    width: 34px;
    height: 34px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, color 0.2s;
  }

  button#settingsBtn:hover { border-color: var(--accent); color: var(--accent); }

  /* CHAT AREA */
  #chatArea {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  #chatArea::-webkit-scrollbar { width: 4px; }
  #chatArea::-webkit-scrollbar-track { background: transparent; }
  #chatArea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* EMPTY STATE */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    text-align: center;
    padding: 40px 24px;
    color: var(--text2);
  }

  .empty-icon {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, var(--accent)22, var(--accent2)22);
    border: 1px solid var(--accent)44;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  .empty-state h2 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }

  .empty-state p {
    font-size: 13px;
    line-height: 1.5;
    max-width: 260px;
  }

  .suggestion-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 4px;
  }

  .chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent)11;
  }

  /* MESSAGES */
  .msg {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.user .avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }

  .msg.ai .avatar {
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .bubble {
    max-width: calc(100% - 46px);
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
  }

  .msg.user .bubble {
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg.ai .bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .msg.ai .bubble pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    overflow-x: auto;
    margin: 8px 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }

  .msg.ai .bubble code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    background: var(--bg);
    padding: 1px 5px;
    border-radius: 4px;
  }

  .msg.ai .bubble pre code {
    background: transparent;
    padding: 0;
  }

  .model-tag {
    font-size: 10px;
    color: var(--text2);
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
    padding-left: 38px;
  }

  /* TYPING */
  .typing-dots {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 4px 0;
  }

  .typing-dots span {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* INPUT AREA */
  .input-area {
    padding: 12px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  textarea#msgInput {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 12px;
    outline: none;
    resize: none;
    max-height: 120px;
    min-height: 44px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  textarea#msgInput::placeholder { color: var(--text2); }
  textarea#msgInput:focus { border-color: var(--accent); }

  button#sendBtn {
    width: 44px;
    height: 44px;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }

  button#sendBtn:hover { background: var(--accent2); }
  button#sendBtn:active { transform: scale(0.95); }
  button#sendBtn:disabled { background: var(--border); cursor: not-allowed; }

  .input-hint {
    font-size: 11px;
    color: var(--text2);
    margin-top: 6px;
    text-align: center;
  }

  /* SETTINGS MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: #000a;
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 32px;
    width: 100%;
    max-width: 480px;
    transform: translateY(100%);
    transition: transform 0.3s ease;
  }

  .modal-overlay.open .modal {
    transform: translateY(0);
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal h3 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--text);
  }

  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--text2); }

  .field-hint {
    font-size: 11px;
    color: var(--text2);
    margin-top: 5px;
  }

  .field-hint a {
    color: var(--accent);
    text-decoration: none;
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }

  .btn-save {
    flex: 1;
    background: var(--accent);
    border: none;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-save:hover { background: var(--accent2); }

  .btn-clear {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 12px 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-clear:hover { border-color: var(--error); color: var(--error); }

  /* STATUS BAR */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    padding: 4px 0 0;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--error);
  }

  .status-dot.connected { background: var(--success); }
  .status-text { color: var(--text2); }

  /* TOAST */
  .toast {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    padding: 10px 18px;
    border-radius: 20px;
    z-index: 200;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--success); color: var(--success); }
  .toast.error { border-color: var(--error); color: var(--error); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    GroqChat
  </div>
  <div class="header-right">
    <select id="modelSelect">
      <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
      <option value="llama-3.1-8b-instant">Llama 3.1 8B (Fast)</option>
      <option value="llama3-70b-8192">Llama3 70B</option>
      <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
      <option value="gemma2-9b-it">Gemma 2 9B</option>
      <option value="deepseek-r1-distill-llama-70b">DeepSeek R1 70B</option>
      <option value="qwen-qwq-32b">Qwen QwQ 32B</option>
    </select>
    <button id="settingsBtn" title="Settings">⚙️</button>
  </div>
</header>

<div id="chatArea">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">⚡</div>
    <h2>GroqChat</h2>
    <p>Blazing fast AI — powered by Groq's free API. No credits needed.</p>
    <div class="suggestion-chips">
      <div class="chip" onclick="sendSuggestion('Explain quantum computing simply')">Quantum computing</div>
      <div class="chip" onclick="sendSuggestion('Write a Python hello world')">Python code</div>
      <div class="chip" onclick="sendSuggestion('What is machine learning?')">Machine learning</div>
      <div class="chip" onclick="sendSuggestion('Tell me a fun fact')">Fun fact</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="msgInput" placeholder="Message..." rows="1"></textarea>
    <button id="sendBtn">➤</button>
  </div>
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">No API key — tap ⚙️ to set up</span>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>⚙️ Settings</h3>
    <div class="field">
      <label>GROQ API KEY</label>
      <input type="password" id="apiKeyInput" placeholder="gsk_xxxxxxxxxxxxxxxxxxxx" />
      <div class="field-hint">
        Get your free key at <a href="https://console.groq.com/keys" target="_blank">console.groq.com/keys</a> — no credit card needed.
      </div>
    </div>
    <div class="field">
      <label>SYSTEM PROMPT (optional)</label>
      <input type="text" id="systemInput" placeholder="You are a helpful assistant..." />
    </div>
    <div class="modal-actions">
      <button class="btn-clear" onclick="clearChat()">🗑 Clear Chat</button>
      <button class="btn-save" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // State
  let messages = [];
  let apiKey = localStorage.getItem('groq_key') || '';
  let systemPrompt = localStorage.getItem('groq_system') || 'You are a helpful, concise assistant.';
  let isLoading = false;

  const chatArea = document.getElementById('chatArea');
  const emptyState = document.getElementById('emptyState');
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  const modelSelect = document.getElementById('modelSelect');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const apiKeyInput = document.getElementById('apiKeyInput');
  const systemInput = document.getElementById('systemInput');
  const modalOverlay = document.getElementById('modalOverlay');
  const toast = document.getElementById('toast');

  // Init
  apiKeyInput.value = apiKey;
  systemInput.value = systemPrompt;
  updateStatus();

  function updateStatus() {
    if (apiKey) {
      statusDot.className = 'status-dot connected';
      statusText.textContent = 'Connected — ' + modelSelect.value;
    } else {
      statusDot.className = 'status-dot';
      statusText.textContent = 'No API key — tap ⚙️ to set up';
    }
  }

  modelSelect.addEventListener('change', updateStatus);

  // Settings modal
  document.getElementById('settingsBtn').onclick = () => {
    modalOverlay.classList.add('open');
  };

  modalOverlay.addEventListener('click', (e) => {
    if (e.target === modalOverlay) modalOverlay.classList.remove('open');
  });

  function saveSettings() {
    apiKey = apiKeyInput.value.trim();
    systemPrompt = systemInput.value.trim() || 'You are a helpful, concise assistant.';
    localStorage.setItem('groq_key', apiKey);
    localStorage.setItem('groq_system', systemPrompt);
    modalOverlay.classList.remove('open');
    updateStatus();
    showToast('Settings saved ✓', 'success');
  }

  function clearChat() {
    messages = [];
    chatArea.innerHTML = '';
    chatArea.appendChild(emptyState);
    emptyState.style.display = 'flex';
    modalOverlay.classList.remove('open');
    showToast('Chat cleared', '');
  }

  // Toast
  function showToast(msg, type) {
    toast.textContent = msg;
    toast.className = 'toast ' + type + ' show';
    setTimeout(() => toast.className = 'toast ' + type, 2200);
  }

  // Auto resize textarea
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
  });

  // Send on Enter (not shift+enter)
  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.onclick = sendMessage;

  function sendSuggestion(text) {
    msgInput.value = text;
    sendMessage();
  }

  function renderMarkdown(text) {
    // Code blocks
    text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${escapeHtml(code.trim())}</code></pre>`
    );
    // Inline code
    text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${escapeHtml(c)}</code>`);
    // Bold
    text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    // Italic
    text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
    // Newlines
    text = text.replace(/\n/g, '<br>');
    return text;
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function addMessage(role, content, model) {
    if (emptyState.parentNode) emptyState.style.display = 'none';

    const div = document.createElement('div');
    div.className = 'msg ' + role;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '⚡';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = role === 'ai' ? renderMarkdown(content) : escapeHtml(content).replace(/\n/g,'<br>');

    div.appendChild(avatar);
    div.appendChild(bubble);
    chatArea.appendChild(div);

    if (role === 'ai' && model) {
      const tag = document.createElement('div');
      tag.className = 'model-tag';
      tag.textContent = model;
      chatArea.appendChild(tag);
    }

    chatArea.scrollTop = chatArea.scrollHeight;
    return bubble;
  }

  function addTyping() {
    if (emptyState.parentNode) emptyState.style.display = 'none';
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '⚡';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

    div.appendChild(avatar);
    div.appendChild(bubble);
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    if (isLoading) return;
    const text = msgInput.value.trim();
    if (!text) return;

    if (!apiKey) {
      modalOverlay.classList.add('open');
      showToast('Enter your Groq API key first', 'error');
      return;
    }

    msgInput.value = '';
    msgInput.style.height = 'auto';
    isLoading = true;
    sendBtn.disabled = true;

    messages.push({ role: 'user', content: text });
    addMessage('user', text);
    addTyping();

    const model = modelSelect.value;

    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + apiKey
        },
        body: JSON.stringify({
          model: model,
          messages: [
            { role: 'system', content: systemPrompt },
            ...messages
          ],
          max_tokens: 2048,
          temperature: 0.7,
          stream: false
        })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error?.message || 'API error ' + res.status);
      }

      const data = await res.json();
      const reply = data.choices[0].message.content;
      messages.push({ role: 'assistant', content: reply });

      removeTyping();
      addMessage('ai', reply, model);

    } catch (err) {
      removeTyping();
      addMessage('ai', '❌ Error: ' + err.message, null);
      showToast(err.message, 'error');
    }

    isLoading = false;
    sendBtn.disabled = false;
    updateStatus();
    msgInput.focus();
  }
</script>
</body>
</html>
